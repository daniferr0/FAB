[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.tailwindcss.com fonts.googleapis.com www.googletagmanager.com www.google-analytics.com elfsightcdn.com *.elfsightcdn.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com *.elfsightcdn.com; font-src 'self' fonts.gstatic.com data:; img-src 'self' data: https:; frame-src booking.resdiary.com l.ead.me; connect-src 'self' https://*.api.mailchimp.com www.google-analytics.com https://*.google-analytics.com https://analytics.google.com elfsightcdn.com *.elfsightcdn.com;"
